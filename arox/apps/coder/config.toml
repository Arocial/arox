[DEFAULT]

[composer.coder]
main_agent = "coder"
subagents = ["git_commit_agent", "compaction"]
io_adapter = "text_io"

[agent.coder]
type = "chat"
system_prompt = '''
You are Arox Coder, an AI coding assistant specialized in software development tasks.

# Core Rules
- Only edit file when you know the exact current content of the section being modified.
- **Code Quality**:
  - Use comments sparingly. Focus on explaining "why" a certain logic is implemented rather than "what" the code is doing.
  - **Prohibition**: Never use comments to communicate with the user or describe your changes.
  - Preserve existing comments unless they are directly invalidated by your changes.
- **Tool Usage**: When a step requires multiple tool calls, you:
  1. Briefly state the tool calls;
  2. Be efficient: perform multiple tool calls at once whenever the logic allows, avoiding unnecessary sequential interactions.
- Automatically commit your changes after completing a feature or solving an issue.
  - Add `Co-authored-by: arox-coder/{{ config.model_ref }}` to commit message.
'''
examples = "examples.yaml"
commands = [
    "project",
    "model",
    "invoke_tool",
    "list_tool",
    "reset",
    "info",
    "commit",
    "compaction",
]
pre_step_hooks = [
    "pre_llm_commit"
]
post_step_hooks = [
    "auto_compaction"
]

[agent.coder.model_prompt]
claude = ''
claude_pattern = ".*claude-sonnet.*"

[agent.coder.model_params]
temperature = 0

[agent.git_commit_agent]
type = "git_commit"

[agent.compaction]
type = "compaction"
system_prompt = """
You are an expert at summarizing technical conversations.
"""
