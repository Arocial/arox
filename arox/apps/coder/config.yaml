agent:
  coder:
    examples:
      - kind: request
        parts:
          - part_kind: user-prompt
            content: |
              I need to fix the implementation of `is_prime`. It currently returns incorrect results for some inputs, and the performance could be improved. Can you help me update the math utilities?

              Project structure:
              src/main.py
              src/utils/__init__.py
              src/utils/math.py
      - kind: response
        parts:
          - part_kind: tool-call
            tool_name: read
            args:
              path: src/utils/math.py
            tool_call_id: call_ex1
      - kind: request
        parts:
          - part_kind: tool-return
            tool_name: read
            content: |
              """Math utility functions for the application."""
              def is_prime(n):
                  """Check if a number is prime."""
                  if n <= 2:
                      return False
                  for i in range(2, int(n ** 0.5)):
                      if n % i == 0:
                          return False
                  return True
            tool_call_id: call_ex1
      - kind: response
        parts:
          - part_kind: text
            content: |
              The current implementation of `is_prime` fails for the number 2 (which is prime) and has an off-by-one error in the loop range. I will optimize it to handle edge cases and improve performance by skipping even numbers.
              I need to edit `src/utils/math.py` and create tests in `tests/test_math.py`.
          - part_kind: tool-call
            tool_name: replace_in_file
            args:
              path: src/utils/math.py
              old_str: |-
                def is_prime(n):
                    """Check if a number is prime."""
                    if n <= 2:
                        return False
                    for i in range(2, int(n ** 0.5)):
                        if n % i == 0:
                            return False
                    return True
              new_str: |-
                def is_prime(n):
                    """Check if a number is prime."""
                    if n < 2:
                        return False
                    if n == 2:
                        return True
                    if n % 2 == 0:
                        return False
                    for i in range(3, int(n ** 0.5) + 1, 2):
                        if n % i == 0:
                            return False
                    return True
            tool_call_id: call_ex2
          - part_kind: tool-call
            tool_name: write_to_file
            args:
              path: tests/test_math.py
              content: |
                import pytest
                from src.utils.math import is_prime

                def test_is_prime():
                    assert is_prime(2) is True
                    assert is_prime(3) is True
                    assert is_prime(4) is False
                    assert is_prime(17) is True
                    assert is_prime(25) is False
            tool_call_id: call_ex3
      - kind: request
        parts:
          - part_kind: tool-return
            tool_name: replace_in_file
            content: "Successfully updated src/utils/math.py"
            tool_call_id: call_ex2
          - part_kind: tool-return
            tool_name: write_to_file
            content: "Successfully wrote to tests/test_math.py"
            tool_call_id: call_ex3
      - kind: response
        parts:
          - part_kind: text
            content: |
              I have fixed the `is_prime` function by:
              1. Correcting the logic for `n=2` and numbers less than 2.
              2. Fixing the loop boundary to include the square root of `n`.
              3. Adding a step to skip even divisors for better performance.
              4. Creating a test suite to verify the fix.
      - kind: request
        parts:
          - part_kind: user-prompt
            content: I switched to a new code base. Please don't consider the above files or try to edit them any longer.
      - kind: response
        parts:
          - part_kind: text
            content: OK.
